builds: ['genome', 'N450']
strain_id_field: "accession"
inputs:
  - name: ppx_open
    metadata: "s3://nextstrain-data/files/workflows/measles/metadata.tsv.zst"
    sequences: "s3://nextstrain-data/files/workflows/measles/sequences.fasta.zst"
files:
    reference: "measles_reference_{build}.gb"
    reference_fasta: "measles_reference_{build}.fasta"
    colors: "colors.tsv"
    auspice_config: "auspice_config_{build}.json"
    description: "description.md"
align_and_extract_N450:
    min_length: 400
# Each option maps dataset patterns to values. Patterns use the format '<build>',
# where each part is a literal value or '*' (any). Patterns are applied top-to-bottom:
# last value wins, except 'query' (AND-concatenated) and list options (extended).
# A scalar/list value applies to all samples; a dict value maps sample name to value.
subsample:
  group_by:
    '*':
      - country
      - year
  exclude:
    '*': dropped_strains.txt
  max_sequences:
    '*':
      early: 2000
      late: 2000
  min_date:
    '*':
      early: 1950
      late: 5Y
  max_date:
    '*':
      early: 5Y
  include:
    genome: include_strains_genome.txt
    N450: include_strains_N450.txt
  min_length:
    genome: 5000
    N450: 400

refine:
  coalescent:
    '*': "opt"
  date_inference:
    '*': "marginal"
  clock_filter_iqd:
    '*': 6
ancestral:
    inference: "joint"
# trait reconstruction applies only to the "genome" build
traits:
    columns:
        - country
        - region
    sampling_bias_correction: 3
tip_frequencies:
    min_date: "2000-01-01"
    max_date: "6M"
    narrow_bandwidth: 0.2
    wide_bandwidth: 0.6
export:
    metadata_columns: "strain division location dataUseTerms dataUseTerms__url restrictedUntil PPX_accession INSDC_accession"
